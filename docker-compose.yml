# ==========================================================================
# Flend — Tek komutla tüm altyapı (Postgres + Redis + RabbitMQ + Kafka)
#
# Demo akışı (önerilen):
#   docker compose up -d            # altyapı (postgres schema+seed otomatik yüklenir)
#   cd backend && npm install && npm start
#   cd backend && npm run worker          (ayrı terminal)
#   cd backend && npm run kafka-consumer  (ayrı terminal, opsiyonel)
#
# Her şeyi container'da çalıştırmak için:  docker compose --profile full up
#
# NOT: api/worker/kafka-consumer yalnızca "full" profilinde başlar; böylece
# varsayılan `docker compose up` host'taki npm start ile 5000 portunu çakıştırmaz.
# ==========================================================================
services:
  # ── PostgreSQL (zorunlu) — schema + seed otomatik yüklenir ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: flend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flend
      POSTGRES_PASSWORD: flend
      POSTGRES_DB: flend
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flend']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis — Cache ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flend_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RabbitMQ — Async Sync Queue ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flend_rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # Management UI → http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Zookeeper (Kafka için) ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: flend_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'

  # ── Kafka — Event Streaming (çift listener: host + container) ────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: flend_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 15s
      timeout: 10s
      retries: 10

  # ── API (opsiyonel: --profile full) ─────────────────────────────────────
  api:
    build: ./backend
    container_name: flend_api
    profiles: ['full']
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://flend:flend@postgres:5432/flend
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: flend-dev-secret-change-me
      DEMO_USER_ID: a0eebc99-9c0b-4ef8-bb6d-6bb9bd380a11
      PORT: 5000
    ports:
      - '5000:5000'
    command: node index.js

  # ── Worker (opsiyonel: --profile full) ──────────────────────────────────
  worker:
    build: ./backend
    container_name: flend_worker
    profiles: ['full']
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      kafka: { condition: service_started }
    environment:
      DATABASE_URL: postgres://flend:flend@postgres:5432/flend
      RABBITMQ_URL: amqp://rabbitmq
      KAFKA_BROKER: kafka:29092
    command: node worker.js

  # ── Kafka Consumer (opsiyonel: --profile full) ──────────────────────────
  kafka-consumer:
    build: ./backend
    container_name: flend_kafka_consumer
    profiles: ['full']
    restart: unless-stopped
    depends_on:
      kafka: { condition: service_started }
    environment:
      KAFKA_BROKER: kafka:29092
    command: node kafkaConsumer.js

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
